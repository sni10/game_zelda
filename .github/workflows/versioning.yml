name: Auto Versioning

# Срабатывает ТОЛЬКО когда PR в main смержен.
# Версия рассчитывается накопительно по Conventional Commits:
#   - каждый `feat:`                    → +1 minor (сброс patch)
#   - каждый `fix:`/`perf:`/`refactor:` → +1 patch
#   - `release:`                        → +1 patch (явный релиз без багфикса)
#   - `chore(release):`/`chore(deps):`  → +1 patch
#   - `[release]` маркер в теле коммита → +1 patch
#   - `Release-As: X.Y.Z` в теле        → форс-версия (перебивает всё)
#   - `BREAKING CHANGE` или `feat!:`/`fix!:` → +1 major (сброс minor/patch)
#   - `docs:`/`chore:`/`test:`/`style:`/`ci:`/`build:` — игнорируются
#
# Если PR смержен, но все коммиты — игнорируемого типа, workflow явно
# напишет в Summary, как форс-релизнуть (release:/[release]/Release-As:/dispatch).
#
# Ручной запуск (workflow_dispatch) сохранён для аварийных сценариев
# с фиксированным типом инкремента.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      increment_type:
        description: 'Force version increment type (manual override)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  MAJOR_VERSION: 0  # стартовая мажорная версия для пустого репо

jobs:
  versioning:
    # Только если PR действительно смержен (а не просто закрыт),
    # либо если запущен вручную.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git tag -l "v*" --sort=-version:refname | head -n1)
          if [[ -z "$LATEST_TAG" ]]; then
            LATEST_TAG="v${MAJOR_VERSION}.0.0"
            echo "No previous tags found, starting from $LATEST_TAG"
          fi
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Calculate version (cumulative)
        id: version
        run: |
          set -e
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          CURRENT_VERSION=${LATEST_TAG#v}

          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          # ---------- Ручной режим (workflow_dispatch) ----------
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ github.event.inputs.increment_type }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "major_bumps=0" >> $GITHUB_OUTPUT
            echo "minor_bumps=0" >> $GITHUB_OUTPUT
            echo "patch_bumps=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ---------- Авто-режим: проход по коммитам ----------
          COMMITS_SINCE_TAG=$(git rev-list --count --no-merges ${LATEST_TAG}..HEAD)
          if [[ $COMMITS_SINCE_TAG -eq 0 ]]; then
            echo "No new commits since $LATEST_TAG, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Analyzing $COMMITS_SINCE_TAG commits since $LATEST_TAG..."

          MAJOR_BUMPS=0
          MINOR_BUMPS=0
          PATCH_BUMPS=0
          SKIPPED_COUNT=0
          FORCED_VERSION=""

          # Хронологический порядок (старые сначала), без merge-коммитов.
          # %B = full body, разделитель NULL чтобы не порвать многострочные.
          while IFS= read -r -d '' COMMIT_MSG; do
            # NB: git log --pretty=format:'%B%x00' inserts an inter-record '\n'
            # between entries, so from the 2nd commit onwards $COMMIT_MSG starts
            # with an empty line. `head -n1` would then return "" and every
            # commit after the first would silently fall into [SKIP].
            # Use the first NON-EMPTY line as the subject instead.
            SUBJECT=$(echo "$COMMIT_MSG" | awk 'NF{print; exit}')

            # 0) Явная форс-версия: "Release-As: 1.2.3" в теле.
            #    Перебивает всё (последняя по списку выигрывает).
            FORCED=$(echo "$COMMIT_MSG" | grep -oE "Release-As:[[:space:]]*v?[0-9]+\.[0-9]+\.[0-9]+" | tail -n1 | sed -E 's/.*Release-As:[[:space:]]*v?//')
            if [[ -n "$FORCED" ]]; then
              FORCED_VERSION="$FORCED"
              echo "  [FORCE] Release-As $FORCED ← $SUBJECT"
              continue
            fi

            # 1) BREAKING CHANGE имеет высший приоритет.
            #    Признаки: "BREAKING CHANGE" в теле ИЛИ "!" перед ":" в типе.
            if echo "$COMMIT_MSG" | grep -qE "BREAKING CHANGE" \
               || echo "$SUBJECT" | grep -qE "^[a-z]+(\([^)]+\))?!:"; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
              MAJOR_BUMPS=$((MAJOR_BUMPS + 1))
              echo "  [MAJOR] $SUBJECT"
              continue
            fi

            # 2) feat: → minor
            if echo "$SUBJECT" | grep -qE "^feat(\([^)]+\))?:"; then
              MINOR=$((MINOR + 1)); PATCH=0
              MINOR_BUMPS=$((MINOR_BUMPS + 1))
              echo "  [MINOR] $SUBJECT"
              continue
            fi

            # 3) fix:/perf:/refactor: → patch
            #    Также: chore(release):, chore(deps):, release: и маркер [release] в теле.
            #    NB: шаг "Generate grouped changelog" ниже должен группировать
            #    эти же типы коммитов, иначе релиз может быть создан без
            #    соответствующих записей в release notes.
            if echo "$SUBJECT" | grep -qE "^(fix|perf|refactor|release)(\([^)]+\))?:" \
               || echo "$SUBJECT" | grep -qE "^chore\((release|deps)\):" \
               || echo "$COMMIT_MSG" | grep -qE "\[release\]"; then
              PATCH=$((PATCH + 1))
              PATCH_BUMPS=$((PATCH_BUMPS + 1))
              echo "  [PATCH] $SUBJECT"
              continue
            fi

            # 4) Прочее (docs, chore, test, style, ci, build, без типа) — игнор.
            SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
            echo "  [SKIP]  $SUBJECT"
          done < <(git log ${LATEST_TAG}..HEAD --no-merges --reverse --pretty=format:'%B%x00')

          # Форс-версия из Release-As: перекрывает накопительные бампы.
          if [[ -n "$FORCED_VERSION" ]]; then
            NEW_VERSION="$FORCED_VERSION"
            NEW_TAG="v${NEW_VERSION}"
            if git tag -l "$NEW_TAG" | grep -q "^${NEW_TAG}$"; then
              echo "ERROR: Forced tag $NEW_TAG already exists!"
              exit 1
            fi
            echo "================================================"
            echo "  Forced via Release-As: $LATEST_TAG  →  $NEW_TAG"
            echo "================================================"
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "major_bumps=0" >> $GITHUB_OUTPUT
            echo "minor_bumps=0" >> $GITHUB_OUTPUT
            echo "patch_bumps=1" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL_BUMPS=$((MAJOR_BUMPS + MINOR_BUMPS + PATCH_BUMPS))
          if [[ $TOTAL_BUMPS -eq 0 ]]; then
            echo "================================================"
            echo "  Versioning skipped"
            echo "  Commits since $LATEST_TAG: $COMMITS_SINCE_TAG"
            echo "  All $SKIPPED_COUNT commits were ignored types"
            echo "  (docs/chore/test/style/ci/build)."
            echo ""
            echo "  To force a release, use one of:"
            echo "   • feat: / fix: / perf: / refactor: / release: prefix"
            echo "   • chore(release): or chore(deps): prefix"
            echo "   • [release] marker in commit body"
            echo "   • Release-As: X.Y.Z in commit body"
            echo "   • Manually run workflow_dispatch (Actions UI)"
            echo "================================================"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          if git tag -l "$NEW_TAG" | grep -q "^${NEW_TAG}$"; then
            echo "ERROR: Tag $NEW_TAG already exists!"
            exit 1
          fi

          echo ""
          echo "================================================"
          echo "  $LATEST_TAG  →  $NEW_TAG"
          echo "  Major bumps: $MAJOR_BUMPS"
          echo "  Minor bumps: $MINOR_BUMPS"
          echo "  Patch bumps: $PATCH_BUMPS"
          echo "================================================"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "major_bumps=$MAJOR_BUMPS" >> $GITHUB_OUTPUT
          echo "minor_bumps=$MINOR_BUMPS" >> $GITHUB_OUTPUT
          echo "patch_bumps=$PATCH_BUMPS" >> $GITHUB_OUTPUT

      - name: Generate grouped changelog
        if: steps.version.outputs.skip != 'true'
        id: changelog
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          NEW_TAG="${{ steps.version.outputs.tag }}"

          # Группировка коммитов по типам Conventional Commits
          BREAKING=$(git log ${LATEST_TAG}..HEAD --no-merges --pretty=format:"- %s (%h)" \
                     -E --grep="BREAKING CHANGE" --grep="^[a-z]+(\([^)]+\))?!:" || true)
          FEATURES=$(git log ${LATEST_TAG}..HEAD --no-merges --pretty=format:"- %s (%h)" \
                     -E --grep="^feat(\([^)]+\))?:" || true)
          FIXES=$(git log ${LATEST_TAG}..HEAD --no-merges --pretty=format:"- %s (%h)" \
                  -E --grep="^fix(\([^)]+\))?:" || true)
          PERF=$(git log ${LATEST_TAG}..HEAD --no-merges --pretty=format:"- %s (%h)" \
                 -E --grep="^perf(\([^)]+\))?:" || true)
          REFACTOR=$(git log ${LATEST_TAG}..HEAD --no-merges --pretty=format:"- %s (%h)" \
                     -E --grep="^refactor(\([^)]+\))?:" || true)
          DOCS=$(git log ${LATEST_TAG}..HEAD --no-merges --pretty=format:"- %s (%h)" \
                 -E --grep="^docs(\([^)]+\))?:" || true)

          TOTAL_COMMITS=$(git rev-list --count --no-merges ${LATEST_TAG}..HEAD)
          CONTRIBUTORS=$(git log ${LATEST_TAG}..HEAD --format='%an' | sort -u | wc -l)

          {
            echo "body<<RELEASE_EOF"
            echo "## ${NEW_TAG}"
            echo ""
            echo "**Bumps:** \`major: ${{ steps.version.outputs.major_bumps }}\` · \`minor: ${{ steps.version.outputs.minor_bumps }}\` · \`patch: ${{ steps.version.outputs.patch_bumps }}\`"
            echo ""
            echo "**Stats:** ${TOTAL_COMMITS} commits · ${CONTRIBUTORS} contributors"
            echo ""
            if [[ -n "$BREAKING" ]]; then
              echo "### 💥 Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi
            if [[ -n "$FEATURES" ]]; then
              echo "### ✨ Features"
              echo "$FEATURES"
              echo ""
            fi
            if [[ -n "$FIXES" ]]; then
              echo "### 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi
            if [[ -n "$PERF" ]]; then
              echo "### ⚡ Performance"
              echo "$PERF"
              echo ""
            fi
            if [[ -n "$REFACTOR" ]]; then
              echo "### 🧱 Refactor"
              echo "$REFACTOR"
              echo ""
            fi
            if [[ -n "$DOCS" ]]; then
              echo "### 📚 Documentation"
              echo "$DOCS"
              echo ""
            fi
            echo "**Full diff:** [\`${LATEST_TAG}...${NEW_TAG}\`](https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_TAG})"
            echo "RELEASE_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG

          Auto-generated by GitHub Actions
          Major bumps: ${{ steps.version.outputs.major_bumps }}
          Minor bumps: ${{ steps.version.outputs.minor_bumps }}
          Patch bumps: ${{ steps.version.outputs.patch_bumps }}
          Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          if [[ "${{ steps.version.outputs.skip }}" == "true" ]]; then
            echo "## ⏭️ Versioning skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All commits since last tag were of ignored types (\`docs/chore/test/style/ci/build\`)." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**To force a release**, use any of:" >> $GITHUB_STEP_SUMMARY
            echo "- \`feat:\` / \`fix:\` / \`perf:\` / \`refactor:\` / \`release:\` prefix" >> $GITHUB_STEP_SUMMARY
            echo "- \`chore(release):\` or \`chore(deps):\` prefix" >> $GITHUB_STEP_SUMMARY
            echo "- \`[release]\` marker in commit body" >> $GITHUB_STEP_SUMMARY
            echo "- \`Release-As: X.Y.Z\` in commit body (force exact version)" >> $GITHUB_STEP_SUMMARY
            echo "- Manually run **Auto Versioning** via workflow_dispatch in Actions UI" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Release created" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| | |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| **Tag** | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| **Major bumps** | ${{ steps.version.outputs.major_bumps }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Minor bumps** | ${{ steps.version.outputs.minor_bumps }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Patch bumps** | ${{ steps.version.outputs.patch_bumps }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Trigger** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          fi