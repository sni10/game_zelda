[display]
window_width = 1024
window_height = 768
fps = 60

[world]
world_width = 2000
world_height = 2000
tile_size = 32

[player]
player_speed = 120
player_size = 32
# Множитель скорости при удержании Shift (sprint).
# 1.0 = без ускорения, 2.0 = в два раза быстрее. 1.8 = "комфортный спринт".
player_sprint_multiplier = 1.8

[attack]
attack_duration = 300
attack_cooldown = 100
attack_range = 40

[colors]
white = 255,255,255
black = 0,0,0
red = 255,0,0
green = 0,255,0
dark_green = 0,100,0
dark_gray = 64,64,64
brown = 139,69,19
gray = 128,128,128
yellow = 255,255,0

[debug]
debug_enabled = true
debug_font_size = 30

[world_generation]
obstacle_count = 150
safe_zone_size = 100

# Параметры спавна и поведения врагов.
# Размер тайла = 32px. Радиус патруля = 2 тайла = 4х4 тайла зона.
[enemies]
# Лёгкий враг (1 удар = смерть)
light_max_health = 1
light_speed = 80
light_size = 24
light_color = 200,80,80
light_damage = 5

# Тяжёлый враг (3 удара)
heavy_max_health = 3
heavy_speed = 40
heavy_size = 40
heavy_color = 120,30,30
heavy_damage = 15

# Быстрый враг (1 удар, скорость > игрока)
fast_max_health = 1
fast_speed = 160
fast_size = 20
fast_color = 255,160,160
fast_damage = 5

# Стартовый спавн при new_game
initial_count_light = 6
initial_count_heavy = 2
initial_count_fast = 4

# Размер зоны патруля в тайлах (квадрат cо стороной = patrol_radius_tiles*2)
patrol_radius_tiles = 2

# Минимальная дистанция спавна от игрока (в пикселях).
# По умолчанию = 1 экран (1024px), чтобы враги появлялись вне видимости.
spawn_min_distance = 1024
# Сколько попыток найти валидную точку спавна (без коллизий)
spawn_max_attempts = 50
# Интервал авто-респавна (секунд). Если игрок отошёл и убил врагов -
# через этот интервал EnemyManager попытается восстановить численность
# до initial_count_*. Респавн всё равно подчиняется spawn_min_distance,
# то есть произойдёт ТОЛЬКО когда игрок отдалился от старой точки.
respawn_interval = 5.0
